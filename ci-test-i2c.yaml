esphome:
  name: pn532-ndef-test
  friendly_name: PN532 NDEF Test

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

logger:
  level: VERY_VERBOSE
  hardware_uart: USB_SERIAL_JTAG

external_components:
  - source:
      type: local
      path: components
    components: [pn532, pn532_spi, pn532_i2c]
    refresh: 0s

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true

pn532_i2c:
  id: pn532_board
  address: 0x24
  update_interval: 2s
  on_tag:
    then:
      - if:
          condition:
            lambda: 'return x == "04-5A-34-53-6F-61-80";'
          then:
            - logger.log: "Writing NEW NDEF URI to tag..."
            - lambda: |-
                auto message = new nfc::NdefMessage();
                message->add_uri_record("https://esphome.io/pn532-new-test");
                id(pn532_board).write_mode(message);
            - wait_until:
                not:
                  pn532.is_writing:
            - logger.log: "NDEF Write finished."

binary_sensor:
  - platform: pn532
    pn532_id: pn532_board
    name: "Target Tag"
    uid: "04-5A-34-53-6F-61-80"
