esphome:
  name: pn532-i2c-test
  friendly_name: PN532 I2C Test

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf
  platform: https://github.com/pioarduino/platform-espressif32.git#51.03.07

logger:
  level: VERY_VERBOSE
  hardware_uart: USB_SERIAL_JTAG

external_components:
  - source:
      type: local
      path: components
    components: [pn532, pn532_spi, pn532_i2c]
    refresh: 0s

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true

pn532_i2c:
  id: pn532_board
  address: 0x24
  update_interval: 2s
  health_check_enabled: true
  auto_reset_on_failure: true
  rf_field_enabled: false
  on_tag:
    then:
      - logger.log:
          format: "I2C Tag detected: %s"
          args: ['x.c_str()']
  on_tag_removed:
    then:
      - logger.log:
          format: "I2C Tag removed: %s"
          args: ['x.c_str()']

binary_sensor:
  - platform: pn532
    pn532_id: pn532_board
    name: "Test Badge I2C"
    uid: "74-10-37-94"
