esphome:
  name: pn532-spi-test
  friendly_name: PN532 SPI Test

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

logger:
  level: VERY_VERBOSE
  hardware_uart: USB_SERIAL_JTAG

external_components:
  - source:
      type: local
      path: components
    components: [pn532, pn532_spi, pn532_i2c]
    refresh: 0s

spi:
  clk_pin: GPIO18
  miso_pin: GPIO20
  mosi_pin: GPIO23

pn532_spi:
  id: pn532_board
  cs_pin: GPIO5
  update_interval: 2s
  health_check_enabled: true
  auto_reset_on_failure: true
  rf_field_enabled: false
  on_tag:
    then:
      - logger.log:
          format: "SPI Tag detected: %s"
          args: ['x.c_str()']
  on_tag_removed:
    then:
      - logger.log:
          format: "SPI Tag removed: %s"
          args: ['x.c_str()']

binary_sensor:
  - platform: pn532
    pn532_id: pn532_board
    name: "Test Badge SPI"
    uid: "74-10-37-94"
