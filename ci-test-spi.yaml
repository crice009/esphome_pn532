esphome:
  name: pn532-spi-ci-test
  friendly_name: PN532 SPI CI Test

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  level: DEBUG

wifi:
  ssid: "CI_DUMMY_SSID"
  password: "CI_DUMMY_PASSWORD"

# Point to the local component in this repo
external_components:
  - source:
      type: local
      path: components
    refresh: 0s

spi:
  clk_pin: GPIO18
  miso_pin: GPIO19
  mosi_pin: GPIO23

pn532_spi:
  id: pn532_board
  cs_pin: GPIO5
  update_interval: 1s
  # Health check options
  health_check_enabled: true
  health_check_interval: 60s
  max_failed_checks: 3
  auto_reset_on_failure: true
  # RF field control (reduces WiFi interference)
  rf_field_enabled: false
  on_tag:
    then:
      - logger.log:
          format: "Tag scanned: %s"
          args: ['x.c_str()']
  on_tag_removed:
    then:
      - logger.log:
          format: "Tag removed: %s"
          args: ['x.c_str()']

binary_sensor:
  - platform: pn532
    pn532_id: pn532_board
    name: "Test Badge SPI"
    uid: "74-10-37-94"
