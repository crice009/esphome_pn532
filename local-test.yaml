esphome:
  name: pn532-dual-bus-test
  on_boot:
    priority: 600
    then:
      - logger.log: "DUAL_BUS_STARTING"

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

logger:
  level: VERY_VERBOSE
  hardware_uart: USB_SERIAL_JTAG

external_components:
  - source:
      type: local
      path: components
    components: [pn532, pn532_spi, pn532_i2c]

# I2C: SDA=21, SCL=22
i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  frequency: 400kHz

# SPI: CLK=18, MISO=20, MOSI=23, CS=5
spi:
  clk_pin: GPIO18
  miso_pin: GPIO20
  mosi_pin: GPIO23

output:
  - platform: gpio
    pin: GPIO2
    id: relay_led

pn532_i2c:
  id: hub_i2c
  address: 0x24
  update_interval: 2s
  on_tag:
    then:
      - logger.log:
          format: "I2C Tag detected: %s"
          args: ['x.c_str()']
      - output.turn_on: relay_led
  on_tag_removed:
    then:
      - logger.log:
          format: "I2C Tag removed: %s"
          args: ['x.c_str()']
      - output.turn_off: relay_led

pn532_spi:
  id: hub_spi
  cs_pin: GPIO5
  update_interval: 2s
  on_tag:
    then:
      - logger.log:
          format: "SPI Tag detected: %s"
          args: ['x.c_str()']
      - output.turn_on: relay_led
  on_tag_removed:
    then:
      - logger.log:
          format: "SPI Tag removed: %s"
          args: ['x.c_str()']
      - output.turn_off: relay_led

binary_sensor:
  - platform: pn532
    pn532_id: hub_i2c
    uid: "00-00-00-00"
    name: "I2C Dummy Tag"
  - platform: pn532
    pn532_id: hub_spi
    uid: "00-00-00-00"
    name: "SPI Dummy Tag"
