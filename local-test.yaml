esphome:
  name: pn532-spi-test
  on_boot:
    priority: 600
    then:
      - logger.log: "DEVICE_STARTING"
      - delay: 5s
      - logger.log: "BOOT_SIGNAL"

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

logger:
  level: VERY_VERBOSE
  hardware_uart: USB_SERIAL_JTAG

external_components:
  - source:
      type: local
      path: components
    components: [pn532, pn532_spi]

# SPI Pinout: CLK=18, MISO=20, MOSI=23, CS=5
spi:
  clk_pin: GPIO18
  miso_pin: GPIO20
  mosi_pin: GPIO23

output:
  - platform: gpio
    pin: GPIO2
    id: relay_led

pn532_spi:
  - id: hub_spi
    cs_pin: GPIO5
    update_interval: 2s
    health_check_enabled: true
    auto_reset_on_failure: true
    rf_field_enabled: true
    on_tag:
      then:
        - logger.log:
            format: "SPI Tag detected: %s"
            args: ['x.c_str()']
        - output.turn_on: relay_led
        - delay: 500ms
        - output.turn_off: relay_led

binary_sensor:
  - platform: pn532
    pn532_id: hub_spi
    uid: "04-1A-A7-67-5F-61-80"
    name: "SPI Tag"
